<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E2E8F0">
    <title>CarSalesBDC - Mobile Vehicle Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-200 min-h-screen font-sans antialiased text-slate-800">

    <header class="bg-white/95 border-b border-slate-300/60 p-3 shadow-sm">
        <div class="max-w-md mx-auto flex items-center justify-between pb-0.5">
            <h1 class="text-lg font-black tracking-tight text-slate-900 uppercase">CarSales<span class="text-blue-600">BDC</span></h1>
            <span class="text-xs bg-slate-100 text-slate-900 font-bold px-2.5 py-1 rounded">A <span class="text-indigo-950 font-black">CB</span> Design</span>
        </div>
    </header>

    <div class="bg-white p-3 pb-2 border-b border-slate-200">
        <div class="max-w-md mx-auto flex flex-col gap-2">
            <div class="flex items-center justify-between gap-2">
                <span id="vehicle-counter" class="text-xs font-bold text-slate-500 uppercase tracking-wide">0 Vehicles</span>
                <div class="relative flex items-center bg-slate-100 rounded-lg px-2 py-1 border border-slate-200/40">
                    <i class="fa-solid fa-arrow-down-wide-short text-slate-400 text-xs mr-1.5"></i>
                    <select id="sort-select" class="bg-transparent text-xs font-bold text-slate-700 outline-none pr-1 appearance-none cursor-pointer">
                        <option value="default">Featured</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="year-new">Newest Year</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-none -mx-3 px-3">
                <button data-type="All" class="type-btn shrink-0 bg-slate-900 text-white font-semibold text-xs px-3.5 py-1.5 rounded-md transition shadow-sm">All Types</button>
                <button data-type="SUV" class="type-btn shrink-0 bg-white border border-slate-300 text-slate-700 font-semibold text-xs px-3.5 py-1.5 rounded-md transition">SUVs</button>
                <button data-type="Sedan" class="type-btn shrink-0 bg-white border border-slate-300 text-slate-700 font-semibold text-xs px-3.5 py-1.5 rounded-md transition">Sedans</button>
                <button data-type="Truck" class="type-btn shrink-0 bg-white border border-slate-300 text-slate-700 font-semibold text-xs px-3.5 py-1.5 rounded-md transition">Trucks</button>
                <button data-type="Coupe" class="type-btn shrink-0 bg-white border border-slate-300 text-slate-700 font-semibold text-xs px-3.5 py-1.5 rounded-md transition">Coupes</button>
            </div>
        </div>
    </div>

    <div id="sticky-search-bar" class="sticky top-0 z-40 bg-white/80 backdrop-blur-sm border-b border-slate-300/60 p-3 shadow-md transition-all duration-300">
        <div class="max-w-md mx-auto flex flex-col gap-2">
            <div class="flex items-center gap-2">
                <div class="relative flex-grow">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="search-input" placeholder="Search thousands of vehicles..." class="w-full bg-slate-100 text-slate-800 placeholder-slate-400 text-base rounded-lg pl-9 pr-3 py-2 outline-none border border-transparent focus:border-blue-500/50 transition">
                </div>
                <button id="filter-icon-btn" class="hidden shrink-0 bg-white/10 hover:bg-white/20 text-white p-2.5 rounded-lg transition border border-white/20 active:scale-95">
                    <i class="fa-solid fa-sliders text-sm"></i>
                </button>
            </div>
            <div id="active-chips-container" class="hidden flex flex-wrap gap-1.5 pt-0.5"></div>
        </div>
    </div>

    <div id="filter-drawer-backdrop" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xs z-50 hidden transition-opacity duration-300"></div>
    <div id="filter-drawer" class="fixed top-0 right-0 bottom-0 w-[60%] max-w-xs bg-slate-900 text-white z-50 translate-x-full transition-transform duration-300 shadow-2xl flex flex-col justify-between">
        
        <div class="p-3 border-b border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-1.5">
                <i class="fa-solid fa-sliders text-amber-400 text-xs"></i>
                <h2 class="font-bold text-xs tracking-tight text-white uppercase">Filters</h2>
            </div>
            <button id="close-drawer-btn" class="text-slate-400 hover:text-white p-1 rounded active:bg-slate-800 transition">
                <i class="fa-solid fa-xmark text-base"></i>
            </button>
        </div>

        <div class="p-3 overflow-y-auto flex-grow flex flex-col gap-4 text-xs">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">Body Type</label>
                <div class="grid grid-cols-2 gap-1.5">
                    <button data-filter-type="type" data-value="SUV" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-center">SUV</button>
                    <button data-filter-type="type" data-value="Sedan" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-center">Sedan</button>
                    <button data-filter-type="type" data-value="Truck" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-center">Truck</button>
                    <button data-filter-type="type" data-value="Coupe" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-center">Coupe</button>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">Max Price</label>
                <div class="grid grid-cols-1 gap-1.5">
                    <button data-filter-type="price" data-value="20000" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-left">Under $20k</button>
                    <button data-filter-type="price" data-value="30000" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-left">Under $30k</button>
                    <button data-filter-type="price" data-value="40000" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-left">Under $40k</button>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">Max Mileage</label>
                <div class="grid grid-cols-1 gap-1.5">
                    <button data-filter-type="miles" data-value="30000" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-left">&lt; 30,000 mi</button>
                    <button data-filter-type="miles" data-value="50000" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-left">&lt; 50,000 mi</button>
                    <button data-filter-type="miles" data-value="75000" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-left">&lt; 75,000 mi</button>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5">Min Year</label>
                <div class="grid grid-cols-1 gap-1.5">
                    <button data-filter-type="year" data-value="2024" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-left">2024 or Newer</button>
                    <button data-filter-type="year" data-value="2023" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-left">2023 or Newer</button>
                    <button data-filter-type="year" data-value="2022" class="drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md transition text-left">2022 or Newer</button>
                </div>
            </div>
        </div>

        <div class="p-3 border-t border-slate-800 bg-slate-950 flex items-center justify-between">
            <button id="reset-all-filters-btn" class="text-[11px] font-bold text-slate-400 hover:text-rose-400 transition underline">Reset All</button>
            <button id="done-drawer-btn" class="bg-amber-400 hover:bg-amber-300 text-slate-950 font-black text-xs px-4 py-2 rounded-md transition uppercase">Done</button>
        </div>
    </div>

    <main class="max-w-md mx-auto p-3 pb-12">
        <div id="vehicle-grid" class="grid grid-cols-2 gap-2"></div>
        
        <div id="scroll-sentinel" class="w-full h-12 flex items-center justify-center mt-4">
            <div id="spinner" class="animate-spin rounded-full h-6 w-6 border-2 border-blue-600 border-t-transparent hidden"></div>
        </div>
    </main>

    <script>
        // Generating pool of 1,000 cars
        const makes = ["Honda", "Toyota", "Ford", "Jeep", "Chevrolet", "Nissan", "Kia", "Subaru"];
        const models = {
            Honda: ["Civic", "Accord", "CR-V", "Pilot", "Ridgeline"], Toyota: ["Camry", "Corolla", "RAV4", "Highlander", "Tundra"],
            Ford: ["F-150", "Explorer", "Escape", "Mustang", "Bronco"], Jeep: ["Wrangler", "Grand Cherokee", "Compass", "Gladiator"],
            Chevrolet: ["Silverado", "Tahoe", "Equinox", "Camaro"], Nissan: ["Altima", "Rogue", "Sentra", "Frontier"],
            Kia: ["Telluride", "Sorento", "Sportage", "Soul"], Subaru: ["Outback", "Crosstrek", "Forester", "WRX"]
        };
        const types = { Civic: "Sedan", Accord: "Sedan", "CR-V": "SUV", Pilot: "SUV", Ridgeline: "Truck", Camry: "Sedan", Corolla: "Sedan", RAV4: "SUV", Highlander: "SUV", Tundra: "Truck", "F-150": "Truck", Explorer: "SUV", Escape: "SUV", Mustang: "Coupe", Bronco: "SUV", Wrangler: "SUV", "Grand Cherokee": "SUV", Compass: "SUV", Gladiator: "Truck", Silverado: "Truck", Tahoe: "SUV", Equinox: "SUV", Camaro: "Coupe", Altima: "Sedan", Rogue: "SUV", Sentra: "Sedan", Frontier: "Truck", Telluride: "SUV", Sorento: "SUV", Sportage: "SUV", Soul: "SUV", Outback: "SUV", Crosstrek: "SUV", Forester: "SUV", WRX: "Sedan" };
        const colors = [{ name: "Rallye Red", class: "text-rose-600" }, { name: "Crystal Black", class: "text-slate-800" }, { name: "Bright White", class: "text-slate-400" }, { name: "Sonic Gray", class: "text-teal-600" }, { name: "Cavalry Blue", class: "text-blue-600" }];

        const allVehicles = Array.from({ length: 1000 }, (_, i) => {
            const make = makes[i % makes.length];
            const modelList = models[make];
            const model = modelList[i % modelList.length];
            const price = 19000 + ((i * 797) % 48000);
            return {
                id: i + 1,
                year: 2021 + (i % 5),
                make: make,
                model: model,
                type: types[model] || "SUV",
                price: price,
                payment: Math.round(price / 68),
                miles: (1200 + ((i * 1432) % 72000)).toLocaleString(),
                color: colors[i % colors.length].name,
                colorClass: colors[i % colors.length].class,
                img: "carsalesimage.JPG"
            };
        });

        // Pagination Config
        const ITEMS_PER_PAGE = 24;
        let filteredVehicles = [...allVehicles]; 
        let currentPage = 1;

        // DOM Handles
        const grid = document.getElementById('vehicle-grid');
        const searchInput = document.getElementById('search-input');
        const typeButtons = document.querySelectorAll('.type-btn');
        const sortSelect = document.getElementById('sort-select');
        const counter = document.getElementById('vehicle-counter');
        const sentinel = document.getElementById('scroll-sentinel');
        const spinner = document.getElementById('spinner');

        let activeType = 'All', searchTerm = '', currentSort = 'default';

        function renderNextBatch() {
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const batch = filteredVehicles.slice(start, end);

            if (batch.length === 0 && currentPage === 1) {
                grid.innerHTML = `<div class="col-span-2 text-center py-12 text-slate-400 bg-white rounded-xl border border-dashed border-slate-300"><p>No vehicles found.</p></div>`;
                return;
            }

            let htmlString = '';
            batch.forEach(car => {
                htmlString += `
                    <article class="bg-white border border-slate-300/80 rounded-xl overflow-hidden flex flex-col justify-between shadow-sm transition transform active:scale-[0.99]">
                        <a href="vdp.html?id=${car.id}" class="block cursor-pointer flex-grow">
                            <div class="p-2 pb-0">
                                <div class="relative aspect-[4/3] bg-slate-100 w-[104%] -ml-[2%] rounded-xl overflow-hidden shadow-sm border border-slate-300/30">
                                    <img src="${car.img}" alt="${car.year} ${car.make} ${car.model}" class="w-full h-full object-cover rounded-xl" loading="lazy">
                                </div>
                            </div>
                            <div class="p-2.5 flex flex-col justify-between">
                                <div>
                                    <h2 class="text-base font-bold text-slate-800 tracking-tight truncate leading-tight">${car.year} ${car.make} ${car.model}</h2>
                                    <div class="flex flex-wrap items-center gap-x-1.5 mt-1 text-xs text-slate-500">
                                        <span>${car.miles} mi</span><span>•</span><span class="${car.colorClass} font-semibold truncate max-w-[85px]">${car.color}</span>
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <div class="flex items-center justify-between gap-1">
                                        <div class="text-base font-black text-emerald-600 leading-none">$${car.price.toLocaleString()}</div>
                                        <span class="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-0.5 rounded uppercase tracking-wider">${car.type}</span>
                                    </div>
                                    <div class="text-[11px] text-slate-500 mt-1 font-medium">Est. $${car.payment}/mo</div>
                                </div>
                            </div>
                        </a>

                        <div class="p-2 pt-0 grid grid-cols-5 gap-1">
                            <button class="col-span-4 bg-blue-600 active:bg-blue-700 text-white font-bold text-[10px] py-2 rounded-md transition tracking-wide shadow-sm truncate">Check Availability</button>
                            <a href="tel:5733564614" class="col-span-1 border border-slate-200 active:bg-slate-50 flex items-center justify-center rounded-md text-blue-600"><i class="fa-solid fa-phone text-xs"></i></a>
                        </div>
                    </article>
                `;
            });

            grid.insertAdjacentHTML('beforeend', htmlString);
            currentPage++;
        }

        function processInventory() {
            grid.innerHTML = ''; 
            currentPage = 1;

            filteredVehicles = allVehicles.filter(car => {
                const matchesType = (activeType === 'All' || car.type === activeType);
                const masterSearchString = `${car.year} ${car.make} ${car.model} ${car.type} ${car.color} ${car.price} ${car.miles}`.toLowerCase();
                return matchesType && masterSearchString.includes(searchTerm);
            });

            if (currentSort === 'price-low') filteredVehicles.sort((a, b) => a.price - b.price);
            else if (currentSort === 'price-high') filteredVehicles.sort((a, b) => b.price - a.price);
            else if (currentSort === 'year-new') filteredVehicles.sort((a, b) => b.year - a.year);

            counter.innerText = `${filteredVehicles.length} ${filteredVehicles.length === 1 ? 'Vehicle' : 'Vehicles'}`;
            
            renderNextBatch();
        }

        // Intersection Observer for Infinite Scroll
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                const maxPages = Math.ceil(filteredVehicles.length / ITEMS_PER_PAGE);
                if (currentPage <= maxPages) {
                    spinner.classList.remove('hidden');
                    setTimeout(() => {
                        renderNextBatch();
                        spinner.classList.add('hidden');
                    }, 250);
                }
            }
        }, { rootMargin: '150px' });

        observer.observe(sentinel);

        // Input Listeners
        searchInput.addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase().trim(); processInventory(); });
        sortSelect.addEventListener('change', (e) => { currentSort = e.target.value; processInventory(); });

        typeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                typeButtons.forEach(b => {
                    b.className = "type-btn shrink-0 bg-white border border-slate-300 text-slate-700 font-semibold text-xs px-3.5 py-1.5 rounded-md transition";
                });
                btn.className = "type-btn shrink-0 bg-slate-900 text-white font-semibold text-xs px-3.5 py-1.5 rounded-md transition shadow-sm";
                
                activeType = btn.getAttribute('data-type');
                processInventory();
            });
        });

       // Filter Variables State
        let activeMaxPrice = null;
        let activeMaxMiles = null;
        let activeMinYear = null;

        // Drawer Handles
        const stickyBar = document.getElementById('sticky-search-bar');
        const filterIconBtn = document.getElementById('filter-icon-btn');
        const drawerBackdrop = document.getElementById('filter-drawer-backdrop');
        const drawer = document.getElementById('filter-drawer');
        const closeDrawerBtn = document.getElementById('close-drawer-btn');
        const doneDrawerBtn = document.getElementById('done-drawer-btn');
        const resetAllBtn = document.getElementById('reset-all-filters-btn');
        const activeChipsContainer = document.getElementById('active-chips-container');
        const drawerFilterBtns = document.querySelectorAll('.drawer-filter-btn');

        // Scroll listener for Navy shift
        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) {
                stickyBar.classList.remove('bg-white/80', 'backdrop-blur-sm');
                stickyBar.classList.add('bg-slate-900', 'shadow-lg');
                filterIconBtn.classList.remove('hidden');
            } else {
                stickyBar.classList.remove('bg-slate-900', 'shadow-lg');
                stickyBar.classList.add('bg-white/80', 'backdrop-blur-sm');
                filterIconBtn.classList.add('hidden');
            }
        }, { passive: true });

        // Drawer Open / Close Logic
        function openDrawer() {
            drawerBackdrop.classList.remove('hidden');
            drawer.classList.remove('translate-x-full');
        }

        function closeDrawer() {
            drawer.classList.add('translate-x-full');
            drawerBackdrop.classList.add('hidden');
        }

        filterIconBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        doneDrawerBtn.addEventListener('click', closeDrawer);
        drawerBackdrop.addEventListener('click', closeDrawer);

        // Update Yellow Highlight States & Render Yellow Tiles
        function updateUIStates() {
            // 1. Highlight active buttons inside drawer
            drawerFilterBtns.forEach(btn => {
                const type = btn.getAttribute('data-filter-type');
                const val = btn.getAttribute('data-value');
                let isActive = false;

                if (type === 'type' && activeType === val) isActive = true;
                if (type === 'price' && activeMaxPrice === Number(val)) isActive = true;
                if (type === 'miles' && activeMaxMiles === Number(val)) isActive = true;
                if (type === 'year' && activeMinYear === Number(val)) isActive = true;

                if (isActive) {
                    btn.className = "drawer-filter-btn border-2 border-amber-400 bg-amber-400 text-slate-950 py-1.5 px-2 rounded-md font-black text-xs transition text-center shadow-sm";
                } else {
                    btn.className = "drawer-filter-btn border border-slate-700 bg-slate-800 text-slate-200 py-1.5 px-2 rounded-md font-bold text-xs transition text-center";
                }
            });

            // 2. Sync the body type pills at the top of the screen to match
            typeButtons.forEach(b => {
                if(b.getAttribute('data-type') === activeType) {
                    b.className = "type-btn shrink-0 bg-slate-900 text-white font-semibold text-xs px-3.5 py-1.5 rounded-md transition shadow-sm";
                } else {
                    b.className = "type-btn shrink-0 bg-white border border-slate-300 text-slate-700 font-semibold text-xs px-3.5 py-1.5 rounded-md transition";
                }
            });

            // 3. Render Yellow Active Tiles under the search bar
            activeChipsContainer.innerHTML = '';
            let activeCount = 0;

            if (activeType !== 'All') {
                activeCount++;
                activeChipsContainer.innerHTML += `<button onclick="clearSingleFilter('type')" class="inline-flex items-center gap-1 bg-amber-400 text-slate-950 font-bold text-[11px] px-2.5 py-1 rounded-md shadow-xs active:scale-95 transition cursor-pointer">${activeType} <span class="font-black opacity-70">✕</span></button>`;
            }
            if (activeMaxPrice) {
                activeCount++;
                activeChipsContainer.innerHTML += `<button onclick="clearSingleFilter('price')" class="inline-flex items-center gap-1 bg-amber-400 text-slate-950 font-bold text-[11px] px-2.5 py-1 rounded-md shadow-xs active:scale-95 transition cursor-pointer">Under $${(activeMaxPrice/1000).toFixed(0)}k <span class="font-black opacity-70">✕</span></button>`;
            }
            if (activeMaxMiles) {
                activeCount++;
                activeChipsContainer.innerHTML += `<button onclick="clearSingleFilter('miles')" class="inline-flex items-center gap-1 bg-amber-400 text-slate-950 font-bold text-[11px] px-2.5 py-1 rounded-md shadow-xs active:scale-95 transition cursor-pointer">&lt; ${(activeMaxMiles/1000).toFixed(0)}k mi <span class="font-black opacity-70">✕</span></button>`;
            }
            if (activeMinYear) {
                activeCount++;
                activeChipsContainer.innerHTML += `<button onclick="clearSingleFilter('year')" class="inline-flex items-center gap-1 bg-amber-400 text-slate-950 font-bold text-[11px] px-2.5 py-1 rounded-md shadow-xs active:scale-95 transition cursor-pointer">${activeMinYear}+ <span class="font-black opacity-70">✕</span></button>`;
            }
        }

        // Global function to clear a single filter when clicking ✕ on a yellow tile
        window.clearSingleFilter = function(type) {
            if (type === 'type') activeType = 'All';
            if (type === 'price') activeMaxPrice = null;
            if (type === 'miles') activeMaxMiles = null;
            if (type === 'year') activeMinYear = null;
            updateUIStates();
            processInventory();
        };

        // Click Handler for all buttons inside the drawer
        drawerFilterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.getAttribute('data-filter-type');
                const val = btn.getAttribute('data-value');

                if (type === 'type') activeType = (activeType === val) ? 'All' : val;
                if (type === 'price') activeMaxPrice = (activeMaxPrice === Number(val)) ? null : Number(val);
                if (type === 'miles') activeMaxMiles = (activeMaxMiles === Number(val)) ? null : Number(val);
                if (type === 'year') activeMinYear = (activeMinYear === Number(val)) ? null : Number(val);

                updateUIStates();
                processInventory();
            });
        });

        // Click Handler for Reset All
        resetAllBtn.addEventListener('click', () => {
            activeType = 'All';
            activeMaxPrice = null;
            activeMaxMiles = null;
            activeMinYear = null;
            updateUIStates();
            processInventory();
        });

        // Redefine processInventory to apply Price, Mileage, and Year live
        function processInventory() {
            grid.innerHTML = ''; 
            currentPage = 1;

            filteredVehicles = allVehicles.filter(car => {
                const matchesType = (activeType === 'All' || car.type === activeType);
                const masterSearchString = `${car.year} ${car.make} ${car.model} ${car.type} ${car.color} ${car.price} ${car.miles}`.toLowerCase();
                const matchesSearch = masterSearchString.includes(searchTerm);

                // Parse miles string ("45,200 mi" -> 45200)
                const carMilesNum = Number(car.miles.replace(/,/g, ''));

                const matchesPrice = !activeMaxPrice || (car.price <= activeMaxPrice);
                const matchesMiles = !activeMaxMiles || (carMilesNum <= activeMaxMiles);
                const matchesYear = !activeMinYear || (car.year >= activeMinYear);

                return matchesType && matchesSearch && matchesPrice && matchesMiles && matchesYear;
            });

            if (currentSort === 'price-low') filteredVehicles.sort((a, b) => a.price - b.price);
            else if (currentSort === 'price-high') filteredVehicles.sort((a, b) => b.price - a.price);
            else if (currentSort === 'year-new') filteredVehicles.sort((a, b) => b.year - a.year);

            counter.innerText = `${filteredVehicles.length} ${filteredVehicles.length === 1 ? 'Vehicle' : 'Vehicles'}`;
            
            renderNextBatch();
        }

        // Initial Load
        updateUIStates();
        processInventory();
    </script>
</body>
</html>
