<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E2E8F0">
    <title>CarSalesBDC - Lightweight Mobile SRP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-200 min-h-screen font-sans antialiased text-slate-800">

    <!-- Sticky Header Area -->
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-slate-300/60 p-3 shadow-sm">
        <div class="max-w-md mx-auto flex flex-col gap-2.5">
            <div class="flex items-center justify-between pb-0.5">
                <h1 class="text-lg font-black tracking-tight text-slate-900 uppercase">CarSales<span class="text-blue-600">BDC</span></h1>
                <span class="text-xs bg-slate-100 text-slate-700 font-bold px-2.5 py-1 rounded">A CB Design</span>
            </div>

            <!-- Search Input Container -->
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="search-input" placeholder="Search 100+ vehicles..." class="w-full bg-slate-100 text-slate-800 placeholder-slate-400 text-base rounded-lg pl-9 pr-3 py-2 outline-none border border-transparent focus:border-blue-500/50 transition">
            </div>

            <!-- Filter and Sort Section -->
            <div class="flex flex-col gap-2 pt-0.5 border-t border-slate-100">
                <div class="flex items-center justify-between gap-2">
                    <span id="vehicle-counter" class="text-xs font-bold text-slate-500 uppercase tracking-wide">0 Vehicles</span>
                    <div class="relative flex items-center bg-slate-100 rounded-lg px-2 py-1 border border-slate-200/40">
                        <i class="fa-solid fa-arrow-down-wide-short text-slate-400 text-xs mr-1.5"></i>
                        <select id="sort-select" class="bg-transparent text-xs font-bold text-slate-700 outline-none pr-1 appearance-none cursor-pointer">
                            <option value="default">Featured</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="year-new">Newest Year</option>
                        </select>
                    </div>
                </div>

                <!-- Body Type Filter Horizontal Scroll -->
                <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-none -mx-3 px-3">
                    <button data-type="All" class="type-btn shrink-0 bg-slate-800 text-white font-semibold text-xs px-3.5 py-1.5 rounded-md transition shadow-sm">All Types</button>
                    <button data-type="SUV" class="type-btn shrink-0 bg-white border border-slate-300 text-slate-600 font-semibold text-xs px-3.5 py-1.5 rounded-md transition">SUVs</button>
                    <button data-type="Sedan" class="type-btn shrink-0 bg-white border border-slate-300 text-slate-600 font-semibold text-xs px-3.5 py-1.5 rounded-md transition">Sedans</button>
                    <button data-type="Truck" class="type-btn shrink-0 bg-white border border-slate-300 text-slate-600 font-semibold text-xs px-3.5 py-1.5 rounded-md transition">Trucks</button>
                    <button data-type="Coupe" class="type-btn shrink-0 bg-white border border-slate-300 text-slate-600 font-semibold text-xs px-3.5 py-1.5 rounded-md transition">Coupes</button>
                </div>
            </div>
            
            <!-- Brand Filter Scroll Links -->
            <div class="flex gap-1.5 overflow-x-auto pb-0.5 scrollbar-none -mx-3 px-3 border-t border-slate-100 pt-2">
                <button data-make="All" class="make-btn shrink-0 bg-blue-600 text-white font-semibold text-xs px-4 py-1.5 rounded-full shadow-sm transition">All Brands</button>
                <button data-make="Honda" class="make-btn shrink-0 bg-white text-slate-600 border border-slate-200 font-semibold text-xs px-4 py-1.5 rounded-full transition">Honda</button>
                <button data-make="Toyota" class="make-btn shrink-0 bg-white text-slate-600 border border-slate-200 font-semibold text-xs px-4 py-1.5 rounded-full transition">Toyota</button>
                <button data-make="Ford" class="make-btn shrink-0 bg-white text-slate-600 border border-slate-200 font-semibold text-xs px-4 py-1.5 rounded-full transition">Ford</button>
                <button data-make="Jeep" class="make-btn shrink-0 bg-white text-slate-600 border border-slate-200 font-semibold text-xs px-4 py-1.5 rounded-full transition">Jeep</button>
            </div>
        </div>
    </header>

    <!-- Main Dynamic Inventory Interface Grid -->
    <main class="max-w-md mx-auto p-3">
        <div id="vehicle-grid" class="grid grid-cols-2 gap-2"></div>
    </main>

    <script>
        // High-performance dynamic dataset generator to completely bypass file size bloat
        const makes = ["Honda", "Toyota", "Ford", "Jeep", "Chevrolet", "Nissan", "Kia", "Subaru"];
        const models = {
            Honda: ["Civic", "Accord", "CR-V", "Pilot", "Ridgeline"],
            Toyota: ["Camry", "Corolla", "RAV4", "Highlander", "Tundra"],
            Ford: ["F-150", "Explorer", "Escape", "Mustang", "Bronco"],
            Jeep: ["Wrangler", "Grand Cherokee", "Compass", "Gladiator"],
            Chevrolet: ["Silverado", "Tahoe", "Equinox", "Camaro"],
            Nissan: ["Altima", "Rogue", "Sentra", "Frontier"],
            Kia: ["Telluride", "Sorento", "Sportage", "Soul"],
            Subaru: ["Outback", "Crosstrek", "Forester", "WRX"]
        };
        const types = { Civic: "Sedan", Accord: "Sedan", "CR-V": "SUV", Pilot: "SUV", Ridgeline: "Truck", Camry: "Sedan", Corolla: "Sedan", RAV4: "SUV", Highlander: "SUV", Tundra: "Truck", "F-150": "Truck", Explorer: "SUV", Escape: "SUV", Mustang: "Coupe", Bronco: "SUV", Wrangler: "SUV", "Grand Cherokee": "SUV", Compass: "SUV", Gladiator: "Truck", Silverado: "Truck", Tahoe: "SUV", Equinox: "SUV", Camaro: "Coupe", Altima: "Sedan", Rogue: "SUV", Sentra: "Sedan", Frontier: "Truck", Telluride: "SUV", Sorento: "SUV", Sportage: "SUV", Soul: "SUV", Outback: "SUV", Crosstrek: "SUV", Forester: "SUV", WRX: "Sedan" };
        const colors = [
            { name: "Rallye Red", class: "text-rose-600" }, { name: "Crystal Black", class: "text-slate-800" },
            { name: "Bright White", class: "text-slate-400" }, { name: "Sonic Gray", class: "text-teal-600" },
            { name: "Cavalry Blue", class: "text-blue-600" }
        ];

        const vehicles = Array.from({ length: 100 }, (_, i) => {
            const make = makes[i % makes.length];
            const modelList = models[make];
            const model = modelList[i % modelList.length];
            const type = types[model] || "SUV";
            const colorObj = colors[i % colors.length];
            const price = 18000 + ((i * 473) % 45000);
            return {
                id: i + 1,
                year: 2020 + (i % 6),
                make: make,
                model: model,
                type: type,
                price: price,
                payment: Math.round(price / 68),
                miles: (50 + ((i * 1234) % 65000)).toLocaleString(),
                color: colorObj.name,
                colorClass: colorObj.class,
                img: "carsalesimage.JPG"
            };
        });

        // DOM Handles
        const grid = document.getElementById('vehicle-grid');
        const searchInput = document.getElementById('search-input');
        const makeButtons = document.querySelectorAll('.make-btn');
        const typeButtons = document.querySelectorAll('.type-btn');
        const sortSelect = document.getElementById('sort-select');
        const counter = document.getElementById('vehicle-counter');

        let activeMake = 'All', activeType = 'All', searchTerm = '', currentSort = 'default';

        function displayVehicles(list) {
            grid.innerHTML = '';
            counter.innerText = `${list.length} ${list.length === 1 ? 'Vehicle' : 'Vehicles'}`;

            if(list.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center py-12 text-slate-400 font-medium bg-white rounded-xl border border-dashed border-slate-300"><p>No matching vehicles found.</p></div>`;
                return;
            }

            list.forEach(car => {
                grid.innerHTML += `
                    <article class="bg-white border border-slate-300/80 rounded-xl overflow-hidden flex flex-col justify-between shadow-sm transition transform active:scale-[0.99]">
                        <div class="p-2 pb-0">
                            <div class="relative aspect-[4/3] bg-slate-100 w-[104%] -ml-[2%] rounded-xl overflow-hidden shadow-sm border border-slate-300/30">
                                <img src="${car.img}" alt="${car.year} ${car.make} ${car.model}" class="w-full h-full object-cover rounded-xl" loading="lazy">
                            </div>
                        </div>
                        <div class="p-2.5 flex-grow flex flex-col justify-between">
                            <div>
                                <h2 class="text-base font-bold text-slate-800 tracking-tight truncate leading-tight">${car.year} ${car.make} ${car.model}</h2>
                                <div class="flex flex-wrap items-center gap-x-1.5 mt-1 text-xs text-slate-500">
                                    <span>${car.miles} mi</span><span>•</span><span class="${car.colorClass} font-semibold truncate max-w-[85px]">${car.color}</span>
                                </div>
                            </div>
                            <div class="mt-3">
                                <div class="flex items-center justify-between gap-1">
                                    <div class="text-base font-black text-emerald-600 leading-none">$${car.price.toLocaleString()}</div>
                                    <span class="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-0.5 rounded uppercase tracking-wider">${car.type}</span>
                                </div>
                                <div class="text-[11px] text-slate-500 mt-1 font-medium">Est. $${car.payment}/mo</div>
                            </div>
                        </div>
                        <div class="p-2 pt-0 grid grid-cols-5 gap-1">
                            <button class="col-span-4 bg-blue-600 active:bg-blue-700 text-white font-bold text-[10px] py-2 rounded-md transition tracking-wide shadow-sm truncate">Check Availability</button>
                            <a href="tel:5733564614" class="col-span-1 border border-slate-200 active:bg-slate-50 flex items-center justify-center rounded-md text-blue-600"><i class="fa-solid fa-phone text-xs"></i></a>
                        </div>
                    </article>
                `;
            });
        }

        function processInventory() {
            let result = vehicles.filter(car => {
                const matchesMake = (activeMake === 'All' || car.make === activeMake);
                const matchesType = (activeType === 'All' || car.type === activeType);
                const masterSearchString = `${car.year} ${car.make} ${car.model} ${car.type} ${car.color} ${car.price} ${car.miles}`.toLowerCase();
                return matchesMake && matchesType && masterSearchString.includes(searchTerm);
            });

            if (currentSort === 'price-low') result.sort((a, b) => a.price - b.price);
            else if (currentSort === 'price-high') result.sort((a, b) => b.price - a.price);
            else if (currentSort === 'year-new') result.sort((a, b) => b.year - a.year);

            displayVehicles(result);
        }

        searchInput.addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase().trim(); processInventory(); });
        sortSelect.addEventListener('change', (e) => { currentSort = e.target.value; processInventory(); });

        typeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                typeButtons.forEach(b => b.classList.replace('bg-slate-800', 'bg-white'));
                btn.classList.replace('bg-white', 'bg-slate-800');
                activeType = btn.getAttribute('data-type');
                processInventory();
            });
        });

        makeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                makeButtons.forEach(b => b.classList.replace('bg-blue-600', 'bg-white'));
                btn.classList.replace('bg-white', 'bg-blue-600');
                activeMake = btn.getAttribute('data-make');
                processInventory();
            });
        });

        displayVehicles(vehicles);
    </script>
</body>
</html>
