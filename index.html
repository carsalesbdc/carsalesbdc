<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarSalesBDC - Premium Mobile SRP</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white min-h-screen font-sans antialiased text-slate-800">

    <!-- Sticky Header Area with Brand Title -->
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-slate-100 p-3">
        <div class="max-w-md mx-auto flex flex-col gap-2.5">
            
            <!-- Business Branding Header -->
            <div class="flex items-center justify-between pb-0.5">
                <h1 class="text-base font-black tracking-tight text-slate-900 uppercase">CarSales<span class="text-blue-600">BDC</span></h1>
                <span class="text-[11px] bg-slate-100 text-slate-700 font-bold px-2.5 py-1 rounded">A CB Design</span>
            </div>

            <!-- Search Input Container -->
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search year, make, model..." 
                    class="w-full bg-slate-100 text-slate-800 placeholder-slate-400 text-sm rounded-lg pl-9 pr-3 py-2 outline-none border border-transparent focus:border-blue-500/50 transition"
                >
            </div>
            
            <!-- Horizontal Filter Scroll Links -->
            <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-none -mx-3 px-3">
                <button data-make="All" class="filter-btn shrink-0 bg-blue-600 text-white font-semibold text-xs px-3.5 py-1.5 rounded-full shadow-sm transition">All</button>
                <button data-make="Honda" class="filter-btn shrink-0 bg-slate-100 text-slate-600 font-semibold text-xs px-3.5 py-1.5 rounded-full transition">Honda</button>
                <button data-make="Toyota" class="filter-btn shrink-0 bg-slate-100 text-slate-600 font-semibold text-xs px-3.5 py-1.5 rounded-full transition">Toyota</button>
                <button data-make="Ford" class="filter-btn shrink-0 bg-slate-100 text-slate-600 font-semibold text-xs px-3.5 py-1.5 rounded-full transition">Ford</button>
                <button data-make="Jeep" class="filter-btn shrink-0 bg-slate-100 text-slate-600 font-semibold text-xs px-3.5 py-1.5 rounded-full transition">Jeep</button>
            </div>
        </div>
    </header>

    <!-- Main Dynamic Inventory Interface Grid -->
    <main class="max-w-md mx-auto p-3">
        <div id="vehicle-grid" class="grid grid-cols-2 gap-2">
            <!-- JavaScript dynamically injects 4:3 cards right here -->
        </div>
    </main>

    <script>
        // Premium 30-Vehicle Complete Dataset matching carsalesimage.JPG exactly
        const vehicles = [
            { id: 1, year: 2024, make: "Honda", model: "Civic Sport", price: 25495, payment: 379, miles: "4,200", color: "Rallye Red", colorClass: "text-rose-600", img: "carsalesimage.JPG" },
            { id: 2, year: 2021, make: "Toyota", model: "RAV4 XLE", price: 27890, payment: 415, miles: "32,150", color: "Cavalry Blue", colorClass: "text-blue-600", img: "carsalesimage.JPG" },
            { id: 3, year: 2022, make: "Ford", model: "Explorer XLT", price: 34995, payment: 519, miles: "24,800", color: "Carbonized Gray", colorClass: "text-slate-600", img: "carsalesimage.JPG" },
            { id: 4, year: 2024, make: "Honda", model: "Accord EX", price: 28980, payment: 429, miles: "12", color: "Crystal Black", colorClass: "text-slate-700", img: "carsalesimage.JPG" },
            { id: 5, year: 2023, make: "Jeep", model: "Grand Cherokee", price: 38450, payment: 569, miles: "18,400", color: "Bright White", colorClass: "text-slate-500", img: "carsalesimage.JPG" },
            { id: 6, year: 2021, make: "Subaru", model: "Outback Prem.", price: 24995, payment: 369, miles: "41,200", color: "Autumn Green", colorClass: "text-emerald-700", img: "carsalesimage.JPG" },
            { id: 7, year: 2023, make: "Chevrolet", model: "Silverado 1500", price: 44800, payment: 659, miles: "15,300", color: "Red Hot", colorClass: "text-red-600", img: "carsalesimage.JPG" },
            { id: 8, year: 2024, make: "Honda", model: "HR-V LX", price: 26150, payment: 389, miles: "15", color: "Milano Red", colorClass: "text-rose-600", img: "carsalesimage.JPG" },
            { id: 9, year: 2022, make: "Nissan", model: "Altima SV", price: 19890, payment: 299, miles: "34,100", color: "Super Black", colorClass: "text-slate-800", img: "carsalesimage.JPG" },
            { id: 10, year: 2023, make: "Kia", model: "Telluride S", price: 37900, payment: 559, miles: "21,800", color: "Dark Moss", colorClass: "text-amber-700", img: "carsalesimage.JPG" },
            { id: 11, year: 2024, make: "Hyundai", model: "Tucson SEL", price: 29450, payment: 439, miles: "100", color: "Intense Blue", colorClass: "text-blue-600", img: "carsalesimage.JPG" },
            { id: 12, year: 2020, make: "Ford", model: "F-150 XLT", price: 32800, payment: 489, miles: "52,400", color: "Velocity Blue", colorClass: "text-cyan-600", img: "carsalesimage.JPG" },
            { id: 13, year: 2024, make: "Honda", model: "CR-V EX-L", price: 34650, payment: 509, miles: "5", color: "Platinum White", colorClass: "text-slate-500", img: "carsalesimage.JPG" },
            { id: 14, year: 2021, make: "Mazda", model: "CX-5 Touring", price: 21990, payment: 329, miles: "39,700", color: "Soul Red", colorClass: "text-red-600", img: "carsalesimage.JPG" },
            { id: 15, year: 2023, make: "GMC", model: "Sierra 1500", price: 41900, payment: 619, miles: "19,200", color: "Onyx Black", colorClass: "text-slate-800", img: "carsalesimage.JPG" },
            { id: 16, year: 2021, make: "Dodge", model: "Challenger SXT", price: 24850, payment: 369, miles: "28,600", color: "Pitch Black", colorClass: "text-slate-800", img: "carsalesimage.JPG" },
            { id: 17, year: 2024, make: "Honda", model: "Pilot Touring", price: 48600, payment: 719, miles: "8", color: "Sonic Gray", colorClass: "text-teal-600", img: "carsalesimage.JPG" },
            { id: 18, year: 2022, make: "Toyota", model: "Camry SE", price: 23900, payment: 359, miles: "29,400", color: "Predawn Gray", colorClass: "text-slate-600", img: "carsalesimage.JPG" },
            { id: 19, year: 2023, make: "Lexus", model: "RX 350", price: 49950, payment: 739, miles: "14,500", color: "Eminent White", colorClass: "text-slate-500", img: "carsalesimage.JPG" },
            { id: 20, year: 2020, make: "Jeep", model: "Wrangler UTD", price: 31500, payment: 469, miles: "45,100", color: "Firecracker Red", colorClass: "text-red-600", img: "carsalesimage.JPG" },
            { id: 21, year: 2024, make: "Honda", model: "Odyssey EX-L", price: 41200, payment: 609, miles: "25", color: "Modern Steel", colorClass: "text-slate-600", img: "carsalesimage.JPG" },
            { id: 22, year: 2021, make: "Ford", model: "Mustang Eco", price: 22900, payment: 339, miles: "31,800", color: "Rapid Red", colorClass: "text-rose-700", img: "carsalesimage.JPG" },
            { id: 23, year: 2023, make: "Tesla", model: "Model 3 Base", price: 31990, payment: 479, miles: "22,400", color: "Solid Black", colorClass: "text-slate-700", img: "carsalesimage.JPG" },
            { id: 24, year: 2024, make: "Honda", model: "Ridgeline RTL", price: 42500, payment: 629, miles: "10", color: "Obsidian Blue", colorClass: "text-blue-700", img: "carsalesimage.JPG" },
            { id: 25, year: 2022, make: "Ram", model: "1500 Horn", price: 36900, payment: 549, miles: "38,200", color: "Delmonico Red", colorClass: "text-red-800", img: "carsalesimage.JPG" },
            { id: 26, year: 2021, make: "Audi", model: "Q5 S-Line", price: 29800, payment: 449, miles: "36,400", color: "Ibis White", colorClass: "text-slate-500", img: "carsalesimage.JPG" },
            { id: 27, year: 2023, make: "VW", model: "Tiguan SE", price: 25990, payment: 389, miles: "18,900", color: "Pyrite Silver", textClass: "text-slate-500", img: "carsalesimage.JPG" },
            { id: 28, year: 2024, make: "Honda", model: "Passport TS", price: 44500, payment: 659, miles: "11", color: "Diffused Sky", colorClass: "text-cyan-600", img: "carsalesimage.JPG" },
            { id: 29, year: 2022, make: "Volvo", model: "XC60 B5", price: 31400, payment: 469, miles: "27,300", color: "Thunder Grey", colorClass: "text-slate-600", img: "carsalesimage.JPG" },
            { id: 30, year: 2023, make: "BMW", model: "330i xDrive", price: 35900, payment: 539, miles: "20,100", color: "Portimao Blue", colorClass: "text-blue-600", img: "carsalesimage.JPG" }
        ];

        // Cache essential DOM handles
        const grid = document.getElementById('vehicle-grid');
        const searchInput = document.getElementById('search-input');
        const filterButtons = document.querySelectorAll('.filter-btn');

        // Initialize state tracker variables
        let activeMake = 'All';
        let searchTerm = '';

        // Render Cards with 4:3 standard ratio, visual offset framework, and rounded image elements
        function displayVehicles(list) {
            grid.innerHTML = '';
            list.forEach(car => {
                const card = `
                    <article class="bg-slate-50 border border-slate-200/60 rounded-xl overflow-hidden flex flex-col justify-between shadow-sm transition transform active:scale-[0.99]">
                        
                        <!-- Framed In Image Layout Container: Standard 4:3 Ratio with Slight Left Alignment Shift -->
                        <div class="p-2 pb-0">
                            <div class="relative aspect-[4/3] bg-slate-200 w-[104%] -ml-[2%] rounded-xl overflow-hidden shadow-sm border border-slate-300/40">
                                <img src="${car.img}" alt="${car.year} ${car.make} ${car.model}" class="w-full h-full object-cover rounded-xl" onerror="console.log('Failed loading image:', this.src)">
                            </div>
                        </div>

                        <!-- Clean Vehicle Profile Details (Enlarged for Premium Readability) -->
                        <div class="p-2.5 flex-grow flex flex-col justify-between">
                            <div>
                                <h2 class="text-sm font-bold text-slate-800 truncate leading-tight">${car.year} ${car.make} ${car.model}</h2>
                                <div class="flex flex-wrap items-center gap-x-1 mt-1 text-[11px] text-slate-500">
                                    <span>${car.miles} mi</span>
                                    <span>•</span>
                                    <span class="${car.colorClass} font-semibold">${car.color}</span>
                                </div>
                            </div>
                            <div class="mt-2.5">
                                <div class="text-sm font-black text-emerald-600 leading-none">$${car.price.toLocaleString()} <span class="text-[9px] font-normal text-slate-400 uppercase tracking-wider">All-In</span></div>
                                <div class="text-[10px] text-slate-500 mt-1 font-medium">Est. $${car.payment}/mo</div>
                            </div>
                        </div>

                        <!-- Primary Action Call to Actions -->
                        <div class="p-2 pt-0 grid grid-cols-4 gap-1">
                            <button class="col-span-3 bg-blue-600 active:bg-blue-700 text-white font-bold text-[10px] py-1.5 rounded-md transition tracking-wide shadow-sm">Check Avail</button>
                            <a href="tel:5733564614" class="col-span-1 border border-slate-200 hover:border-slate-300 active:bg-slate-100 flex items-center justify-center rounded-md text-blue-600"><i class="fa-solid fa-phone text-[10px]"></i></a>
                        </div>
                    </article>
                `;
                grid.innerHTML += card;
            });
        }

        // Process multidimensional logic filters
        function filterVehicles() {
            const filtered = vehicles.filter(car => {
                const matchesMake = (activeMake === 'All' || car.make === activeMake);
                const matchesSearch = (
                    car.make.toLowerCase().includes(searchTerm) ||
                    car.model.toLowerCase().includes(searchTerm) ||
                    car.year.toString().includes(searchTerm)
                );
                return matchesMake && matchesSearch;
            });
            displayVehicles(filtered);
        }

        // Attach Search Input handling
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            filterVehicles();
        });

        // Attach Filter Tab navigation logic
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
                    b.classList.add('bg-slate-100', 'text-slate-600');
                });
                btn.classList.remove('bg-slate-100', 'text-slate-600');
                btn.classList.add('bg-blue-600', 'text-white', 'shadow-sm');

                activeMake = btn.getAttribute('data-make');
                filterVehicles();
            });
        });

        // Initial Execution Cycle on page mount
        displayVehicles(vehicles);
    </script>
</body>
</html>
