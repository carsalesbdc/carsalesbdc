                            <option value="price-high">Price: High to Low</option>
                            <option value="year-new">Newest Year</option>

                    </div>
                </div>

            { id: 98, year: 2021, make: "Lexus", model: "NX 300 F Sport", type: "SUV", price: 30900, payment: 459, miles: "35,200", color: "Cadmium Orange", colorClass: "text-orange-700", img: "carsalesimage.JPG" },
            { id: 99, year: 2024, make: "Honda", model: "Civic Sedan LX", type: "Sedan", price: 24250, payment: 359, miles: "10", color: "Aegean Blue", colorClass: "text-blue-600", img: "carsalesimage.JPG" },
            { id: 100, year: 2023, make: "Chevrolet", model: "Camaro LT1", type: "Coupe", price: 38900, payment: 579, miles: "11,800", color: "Vivid Orange", colorClass: "text-orange-600", img: "carsalesimage.JPG" }
        ];

        // Cache DOM Handles
        const grid = document.getElementById('vehicle-grid');
        const searchInput = document.getElementById('search-input');
        const makeButtons = document.querySelectorAll('.make-btn');
        const typeButtons = document.querySelectorAll('.type-btn');
        const sortSelect = document.getElementById('sort-select');
        const counter = document.getElementById('vehicle-counter');

        // State Trackers
        let activeMake = 'All';
        let activeType = 'All';
        let searchTerm = '';
        let currentSort = 'default';

        // Render Inventory Interface Setup
        function displayVehicles(list) {
            grid.innerHTML = '';
            
            // Update UI count badge dynamically
            counter.innerText = `${list.length} ${list.length === 1 ? 'Vehicle' : 'Vehicles'}`;

            if(list.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 text-center py-12 text-slate-400 font-medium bg-white rounded-xl border border-dashed border-slate-300">
                        <i class="fa-solid fa-car-triangle text-2xl mb-2 text-slate-300"></i>
                        <p>No matching vehicles found.</p>
                    </div>
                `;
                return;
            }

            list.forEach(car => {
                const card = `
                    <article class="bg-white border border-slate-300/80 rounded-xl overflow-hidden flex flex-col justify-between shadow-sm transition transform active:scale-[0.99]">
                        
                        <!-- Framed Image Container Area (4:3 Ratio) -->
                        <div class="p-2 pb-0">
                            <div class="relative aspect-[4/3] bg-slate-100 w-[104%] -ml-[2%] rounded-xl overflow-hidden shadow-sm border border-slate-300/30">
                                <img src="${car.img}" alt="${car.year} ${car.make} ${car.model}" class="w-full h-full object-cover rounded-xl" loading="lazy">
                            </div>
                        </div>

                        <!-- Car Profile Typography Details -->
                        <div class="p-2.5 flex-grow flex flex-col justify-between">
                            <div>
                                <h2 class="text-base font-bold text-slate-800 tracking-tight truncate leading-tight">${car.year} ${car.make} ${car.model}</h2>
                                <div class="flex flex-wrap items-center gap-x-1.5 mt-1 text-xs text-slate-500">
                                    <span>${car.miles} mi</span>
                                    <span>•</span>
                                    <span class="${car.colorClass} font-semibold truncate max-w-[85px]">${car.color}</span>
                                </div>
                            </div>
                            <div class="mt-3">
                                <div class="flex items-center justify-between gap-1">
                                    <div class="text-base font-black text-emerald-600 leading-none">$${car.price.toLocaleString()}</div>
                                    <span class="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-0.5 rounded uppercase tracking-wider">${car.type}</span>
                                </div>
                                <div class="text-[11px] text-slate-500 mt-1 font-medium">Est. $${car.payment}/mo</div>
                            </div>
                        </div>

                        <!-- CTA Dynamic Layout Group -->
                        <div class="p-2 pt-0 grid grid-cols-5 gap-1">
                            <button class="col-span-4 bg-blue-600 active:bg-blue-700 text-white font-bold text-[10px] py-2 rounded-md transition tracking-wide shadow-sm truncate">Check Availability</button>
                            <a href="tel:5733564614" class="col-span-1 border border-slate-200 active:bg-slate-50 flex items-center justify-center rounded-md text-blue-600"><i class="fa-solid fa-phone text-xs"></i></a>
                        </div>
                    </article>
                `;
                grid.innerHTML += card;
            });
        }

        // Processing Pipeline: Filters array first, then runs requested sorting rule
        function processInventory() {
            // Step 1: Filter Dataset
            let result = vehicles.filter(car => {
                const matchesMake = (activeMake === 'All' || car.make === activeMake);
                const matchesType = (activeType === 'All' || car.type === activeType);
                
                const masterSearchString = `
                    ${car.year} ${car.make} ${car.model} ${car.type} ${car.color} ${car.price} ${car.miles}
                `.toLowerCase();

                const matchesSearch = masterSearchString.includes(searchTerm);
                return matchesMake && matchesType && matchesSearch;
            });

            // Step 2: Apply Sorting Structure
            if (currentSort === 'price-low') {
                result.sort((a, b) => a.price - b.price);
            } else if (currentSort === 'price-high') {
                result.sort((a, b) => b.price - a.price);
            } else if (currentSort === 'year-new') {
                result.sort((a, b) => b.year - a.year);
            }

            displayVehicles(result);
        }

        // Live Event Listeners Setup
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase().trim();
            processInventory();
        });

        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            processInventory();
        });

        // Type Filter Pills Toggles
        typeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                typeButtons.forEach(b => {
                    b.classList.remove('bg-slate-800', 'text-white', 'shadow-sm');
                    b.classList.add('bg-white', 'text-slate-600', 'border-slate-300');
                });
                btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-300');
                btn.classList.add('bg-slate-800', 'text-white', 'shadow-sm');

                activeType = btn.getAttribute('data-type');
                processInventory();
            });
        });

        // Brand Filter Badges Toggles
        makeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                makeButtons.forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
                    b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                });
                btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                btn.classList.add('bg-blue-600', 'text-white', 'shadow-sm');

                activeMake = btn.getAttribute('data-make');
                processInventory();
            });
        });

        // Initial Engine Start
        displayVehicles(vehicles);
    </script>
